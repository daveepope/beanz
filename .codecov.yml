coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 0%
    patch:
      default:
        target: 80%
        threshold: 0%
        informational: false

flag_management:
  default_rules:
    - flags:
        - linux
      paths:
        - "src/**"

ignore:
  - "target/**"
  - "tests/**"
  - "sync_agent_rules.py"
