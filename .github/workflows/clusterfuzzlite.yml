name: ClusterFuzzLite

on:
  schedule:
    - cron: "0 4 * * 0"

permissions:
  contents: read

jobs:
  batch:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-batch-${{ matrix.sanitizer }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address]
    steps:
      - name: Build Fuzzers (${{ matrix.sanitizer }})
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1
        with:
          language: rust
          sanitizer: ${{ matrix.sanitizer }}
      - name: Run Fuzzers (${{ matrix.sanitizer }})
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 300
          mode: batch
          sanitizer: ${{ matrix.sanitizer }}
          storage-repo: ${{ secrets.FUZZ_STORAGE_TOKEN != '' && format('https://{0}@github.com/daveepope/beanz-fuzz-corpus.git', secrets.FUZZ_STORAGE_TOKEN) || '' }}
