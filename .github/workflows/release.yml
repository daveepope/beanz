name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: macos-latest
            target: x86_64-apple-darwin
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        env:
          TARGET: ${{ matrix.target }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tar czf "beanz-v${VERSION}-${TARGET}.tar.gz" -C "target/${TARGET}/release" beanz
      - uses: actions/upload-artifact@v4
        with:
          name: beanz-${{ matrix.target }}
          path: beanz-v*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: actions/download-artifact@v4
        with:
          pattern: beanz-*
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
      - name: Update formula
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          TAG="${VERSION}"
          VERSION="${VERSION#v}"
          FORMULA="Formula/beanz.rb"
          AARCH64=$(sha256sum "dist/beanz-v${VERSION}-aarch64-apple-darwin.tar.gz" | awk '{print $1}')
          X86_64_MAC=$(sha256sum "dist/beanz-v${VERSION}-x86_64-apple-darwin.tar.gz" | awk '{print $1}')
          LINUX=$(sha256sum "dist/beanz-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz" | awk '{print $1}')
          sed -i "s/version \".*\"/version \"${VERSION}\"/" "$FORMULA"
          sed -i "s|releases/download/v[^/]*/|releases/download/${TAG}/|g" "$FORMULA"
          sed -i "s|beanz-v[^/]*-aarch64-apple-darwin|beanz-v${VERSION}-aarch64-apple-darwin|g" "$FORMULA"
          sed -i "s|beanz-v[^/]*-x86_64-apple-darwin|beanz-v${VERSION}-x86_64-apple-darwin|g" "$FORMULA"
          sed -i "s|beanz-v[^/]*-x86_64-unknown-linux-gnu|beanz-v${VERSION}-x86_64-unknown-linux-gnu|g" "$FORMULA"
          sed -i "s/PLACEHOLDER_AARCH64_APPLE_DARWIN/${AARCH64}/" "$FORMULA"
          sed -i "s/PLACEHOLDER_X86_64_APPLE_DARWIN/${X86_64_MAC}/" "$FORMULA"
          sed -i "s/PLACEHOLDER_X86_64_UNKNOWN_LINUX_GNU/${LINUX}/" "$FORMULA"
      - name: Open formula pull request
        uses: peter-evans/create-pull-request@v7
        with:
          base: main
          branch: formula/${{ github.ref_name }}
          delete-branch: true
          title: Update Homebrew formula for ${{ github.ref_name }}
          commit-message: Update Homebrew formula for ${{ github.ref_name }}
          body: |
            Automated checksum update for ${{ github.ref_name }}.
            Merge after the GitHub Release assets are published.
