name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: macos-latest
            target: x86_64-apple-darwin
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        env:
          TARGET: ${{ matrix.target }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tar czf "beanz-v${VERSION}-${TARGET}.tar.gz" -C "target/${TARGET}/release" beanz
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: beanz-${{ matrix.target }}
          path: beanz-v*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.ref }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: beanz-*
          path: dist
          merge-multiple: true
      - uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22
      - name: Sign release archives
        run: |
          for archive in dist/*.tar.gz; do
            cosign sign-blob "$archive" --bundle "${archive}.sigstore" --yes
          done
      - name: Update formula
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          TAG="${VERSION}"
          VERSION="${VERSION#v}"
          FORMULA="Formula/beanz.rb"
          AARCH64=$(sha256sum "dist/beanz-v${VERSION}-aarch64-apple-darwin.tar.gz" | awk '{print $1}')
          X86_64_MAC=$(sha256sum "dist/beanz-v${VERSION}-x86_64-apple-darwin.tar.gz" | awk '{print $1}')
          LINUX=$(sha256sum "dist/beanz-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz" | awk '{print $1}')
          sed -i "s/version \".*\"/version \"${VERSION}\"/" "$FORMULA"
          sed -i "s|releases/download/v[^/]*/|releases/download/${TAG}/|g" "$FORMULA"
          sed -i "s|beanz-v[^/]*-aarch64-apple-darwin|beanz-v${VERSION}-aarch64-apple-darwin|g" "$FORMULA"
          sed -i "s|beanz-v[^/]*-x86_64-apple-darwin|beanz-v${VERSION}-x86_64-apple-darwin|g" "$FORMULA"
          sed -i "s|beanz-v[^/]*-x86_64-unknown-linux-gnu|beanz-v${VERSION}-x86_64-unknown-linux-gnu|g" "$FORMULA"
          sed -i "s/PLACEHOLDER_AARCH64_APPLE_DARWIN/${AARCH64}/" "$FORMULA"
          sed -i "s/PLACEHOLDER_X86_64_APPLE_DARWIN/${X86_64_MAC}/" "$FORMULA"
          sed -i "s/PLACEHOLDER_X86_64_UNKNOWN_LINUX_GNU/${LINUX}/" "$FORMULA"
      - uses: softprops/action-gh-release@7c4723f7a335432393329f8f1c564994ce50185d
        with:
          files: |
            dist/*
            Formula/beanz.rb
      - name: Push formula branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="formula/${GITHUB_REF_NAME}"
          git checkout -B "$BRANCH"
          git add Formula/beanz.rb
          git diff --staged --quiet && exit 0
          git commit -m "Update Homebrew formula for ${GITHUB_REF_NAME}"
          git push --force origin "$BRANCH"
      - name: Formula merge note
        run: |
          {
            echo "## Homebrew formula"
            echo "Open a PR from \`formula/${GITHUB_REF_NAME}\` into \`main\`."
            echo "The updated \`Formula/beanz.rb\` is also attached to the GitHub Release."
          } >> "$GITHUB_STEP_SUMMARY"
